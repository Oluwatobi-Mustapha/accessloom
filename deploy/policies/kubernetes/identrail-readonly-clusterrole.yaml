apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: identrail-readonly
rules:
  - apiGroups: [""]
    resources:
      - serviceaccounts
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - clusterroles
      - rolebindings
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
